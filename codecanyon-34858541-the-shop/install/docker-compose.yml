services:
  app:
    build: .
    container_name: theshop-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:10.4
    container_name: theshop-db
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: shop
    ports:
      - "3307:3306"
    volumes:
      - theshop-dbdata:/var/lib/mysql
      - ./shop.sql:/docker-entrypoint-initdb.d/shop.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  theshop-dbdata:
